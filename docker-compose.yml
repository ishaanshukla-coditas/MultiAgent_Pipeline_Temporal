services:

  # ── PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Temporal Server ─────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=db
      - BIND_ON_IP=0.0.0.0
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/7233' 2>/dev/null && exit 0 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  # ── Temporal Web UI ─────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:latest
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:5173
    ports:
      - "8233:8080"

  # ── FastAPI Backend ─────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: uv run uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_TASK_QUEUE=orchestrator-queue
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/content_pipeline
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - CORS_ORIGINS=http://localhost:5173
    ports:
      - "8080:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Workers (one per task queue) ────────────────────────
  worker-orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: uv run python worker.py
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_HOST=temporal:7233
      - WORKER_ROLE=orchestrator
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}

  worker-research:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: uv run python worker.py
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_HOST=temporal:7233
      - WORKER_ROLE=research
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - TAVILY_API_KEY=${TAVILY_API_KEY}

  worker-competitor:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: uv run python worker.py
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_HOST=temporal:7233
      - WORKER_ROLE=competitor
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - TAVILY_API_KEY=${TAVILY_API_KEY}

  worker-writer:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: uv run python worker.py
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_HOST=temporal:7233
      - WORKER_ROLE=writer
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}

  # ── RabbitMQ ────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Web UI → http://localhost:15672 (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Notification Worker (Temporal activity: publish to RabbitMQ) ─
  worker-notification:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: uv run python worker.py
    depends_on:
      temporal:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - TEMPORAL_HOST=temporal:7233
      - WORKER_ROLE=notification
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/

  # ── Notification Consumer (standalone RabbitMQ subscriber) ──
  notification-consumer:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: uv run python notification_consumer.py
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/

  # ── React Frontend ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_PROXY_TARGET=http://backend:8000
    ports:
      - "5173:5173"

volumes:
  pg_data:
